    <link rel="stylesheet" href="style.css">
    <style>
        .photo-card {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        :root {
            --shadow-normal: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-hover: 0 12px 24px rgba(0,0,0,0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --shadow-normal: 0 4px 6px rgba(0,0,0,0.3);
                --shadow-hover: 0 12px 24px rgba(0,0,0,0.5);
            }
        }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            padding-top: calc(64px + 20px); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .gallery-container {
            width: 100%;
            max-width: 1200px;
            column-count: 3; 
            column-gap: 20px;
            padding-top: 20px;
        }

        .photo-card {
            background: transparent;
            border-radius: 16px;
            overflow: hidden; 
            margin-bottom: 20px;
            break-inside: avoid;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            box-shadow: var(--shadow-normal);
            line-height: 0; 
            display: block;
        }

        @media (hover: hover) and (pointer: fine) {
            .photo-card:hover {
                transform: translateY(-4px) scale(1.01);
                box-shadow: var(--shadow-hover);
                z-index: 2;
            }
        }

        .photo-card img {
            width: 100%;
            height: auto; 
            display: block;
            object-fit: cover;
        }

        @media (max-width: 1024px) { .gallery-container { column-count: 2; } } 
        @media (max-width: 768px) { 
            .photo-card img {
                -webkit-touch-callout: none;
                pointer-events: none;
            }
            .main-content { padding: 20px; padding-top: 24px; padding-bottom: 80px; }
            .gallery-container { column-count: 1; }
        }
    </style>
</head>

    <script>
        function clearActiveStates() {
            document.body.style.visibility = 'hidden';
            document.body.offsetHeight;
            document.body.style.visibility = '';
        }

        window.addEventListener('pageshow', function (e) {
            const interactiveElements = document.querySelectorAll('a, button, .nav-item, .bottom-nav-item, .photo-card, .chip');
            interactiveElements.forEach(el => {
                if (typeof el.blur === 'function') el.blur();
            });
            
            if (e.persisted) {
                clearActiveStates();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                clearActiveStates();
            }
        });
    </script>
