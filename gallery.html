<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    
    <meta name="color-scheme" content="light dark">
    <title>Gallery | Trainingcqy</title>
    <link rel="icon" type="image/jpeg" href="img/favicon.jpg">
    <link rel="apple-touch-icon" href="img/favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
	* { -webkit-tap-highlight-color: transparent; }

        .chip, 
        .project-card, 
        .action-btn, 
        .nav-item, 
        .bottom-nav-item,
        .photo-card {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
        }

        :root {
            color-scheme: light dark;
            --bg-color: #f7f9fc; 
            --surface-color: #ffffff;
            --text-primary: #1f1f1f; 
            --text-secondary: #444746;
            --accent-blue: #c2e7ff; 
            --accent-blue-text: #001d35;
            --hover-color: #f0f4f8;
            --border-color: #e0e0e0;
            --primary-blue: #0b57d0; 
            --shadow-normal: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-hover: 0 12px 24px rgba(0,0,0,0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --surface-color: #1e1e1e;
                --text-primary: #e3e3e3;
                --text-secondary: #a0a0a0;
                --accent-blue: #004a77;
                --accent-blue-text: #c2e7ff;
                --hover-color: #2c2c2c;
                --border-color: #333333;
                --primary-blue: #8ab4f8; 
                --shadow-normal: 0 4px 6px rgba(0,0,0,0.3);
                --shadow-hover: 0 12px 24px rgba(0,0,0,0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; min-height: 100vh; }
        
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 64px; z-index: 20;
            display: flex; align-items: center;
            padding: 0 24px; gap: 8px;
            background-color: var(--bg-color);
        }

        .logo-area {
            font-size: 20px; font-weight: 500;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 10px;
            margin-right: 24px; white-space: nowrap;
        }

        .nav-item {
            display: flex; align-items: center; gap: 8px;
            padding: 0 16px; height: 40px; border-radius: 20px;
            text-decoration: none; color: var(--text-secondary);
            font-size: 14px; font-weight: 500;
            transition: background 0.2s; flex-shrink: 0;
            white-space: nowrap;
        }

        @media (hover: hover) and (pointer: fine) {
            .nav-item:hover { background-color: var(--hover-color); }
        }

        .nav-item.active { background-color: var(--accent-blue); color: var(--accent-blue-text); }
        .nav-item .material-symbols-outlined { font-size: 20px; }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            padding-top: calc(64px + 20px); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .gallery-container {
            width: 100%;
            max-width: 1200px;
            column-count: 3; 
            column-gap: 20px;
            padding-top: 20px;
        }

        .photo-card {
            background: transparent;
            border-radius: 16px;
            overflow: hidden; 
            margin-bottom: 20px;
            break-inside: avoid;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            box-shadow: var(--shadow-normal);
            line-height: 0; 
            display: block;
            cursor: zoom-in;
        }

        @media (hover: hover) and (pointer: fine) {
            .photo-card:hover {
                transform: translateY(-4px) scale(1.01);
                box-shadow: var(--shadow-hover);
                z-index: 2;
            }
        }

        .photo-card img {
            width: 100%;
            height: auto; 
            display: block;
            object-fit: cover;
        }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--surface-color);
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: content-box;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            width: 64px;
            height: 100%;
            gap: 4px;
        }

        .bottom-nav-item.active .icon-container { background-color: var(--accent-blue); color: var(--accent-blue-text); }
        .bottom-nav-item .icon-container { width: 64px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s; }
        .bottom-nav-item:active .icon-container { transform: scale(0.95); }
        .bottom-nav-item .material-symbols-outlined { font-size: 24px; }

        @media (max-width: 1024px) { .gallery-container { column-count: 2; } } 
        @media (max-width: 768px) { 
            .photo-card img {
                -webkit-touch-callout: none;
                pointer-events: none;
            }
            .topbar { display: none; }
            .main-content { padding: 20px; padding-top: 24px; padding-bottom: 80px; }
            .gallery-container { column-count: 1; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

        <a href="projects.html" class="nav-item"><span class="material-symbols-outlined">folder_open</span>项目</a>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">home</span></div>

        </a>
        <a href="projects.html" class="bottom-nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">folder_open</span></div>

        <a href="#" class="bottom-nav-item active">
            <div class="icon-container"><span class="material-symbols-outlined">photo_library</span></div>

        </a>
    </nav>

    <script>
        function clearActiveStates() {
            document.body.style.visibility = 'hidden';
            document.body.offsetHeight;
            document.body.style.visibility = '';
        }

        window.addEventListener('pageshow', function (e) {
            const interactiveElements = document.querySelectorAll('a, button, .nav-item, .bottom-nav-item, .photo-card, .chip');
            interactiveElements.forEach(el => {
                if (typeof el.blur === 'function') el.blur();
            });
            
            if (e.persisted) {
                clearActiveStates();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                clearActiveStates();
            }
        });
    </script>

</html>
