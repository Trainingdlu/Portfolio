<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Overview | Trainingcqy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            color-scheme: light dark;
            --bg-color: #f7f9fc; 
            --surface-color: #ffffff;
            --text-primary: #1f1f1f; 
            --text-secondary: #444746;
            --accent-blue: #c2e7ff; 
            --accent-blue-text: #001d35;
            --hover-color: #f0f4f8;
            --active-color: #e0e4e8; 
            --border-color: #e0e0e0; 
            --chip-border: #c4c7c5;  
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --surface-color: #1e1e1e;
                --text-primary: #e3e3e3;
                --text-secondary: #a0a0a0;
                --accent-blue: #004a77;
                --accent-blue-text: #c2e7ff;
                --hover-color: #2c2c2c;
                --active-color: #3d3d3d;
                --border-color: #333333;
                --chip-border: #444444; 
            }
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; min-height: 100vh; }

        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 64px; z-index: 20;
            display: flex; align-items: center;
            padding: 0 24px; gap: 8px;
        }

        .logo-area {
            font-size: 20px; font-weight: 500;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 10px;
            margin-right: 24px; white-space: nowrap;
        }

        .nav-item {
            display: flex; align-items: center; gap: 8px;
            padding: 0 16px; height: 40px; border-radius: 20px;
            text-decoration: none; color: var(--text-secondary);
            font-size: 14px; font-weight: 500;
            transition: background 0.1s; flex-shrink: 0;
            white-space: nowrap;
        }
        
        @media (hover: hover) and (pointer: fine) {
            .nav-item:hover { background-color: var(--hover-color); }
        }
        .nav-item:active { background-color: var(--active-color); }
        
        .nav-item.active { background-color: var(--accent-blue); color: var(--accent-blue-text); }
        .nav-item .material-symbols-outlined { font-size: 20px; }

        .main-content {
            flex: 1;
            padding: 0 40px 40px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            padding-top: 64px; 
        }

        .center-group {
            display: flex; flex-direction: column;
            align-items: center;
            transform: translateY(-68px); 
        }

        .profile-section { 
            text-align: center; 
            margin-bottom: 26px; 
        }

        .avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 1px solid var(--border-color); background: var(--surface-color); padding: 4px;}
        
        .user-name {
            font-family: 'Great Vibes', cursive;
            font-size: 64px;
            font-weight: 400;
            margin-bottom: 4px;
            line-height: 1.1;
        }

        .secret-link {
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.5s ease;
            position: relative;
        }
        .secret-link:hover { color: #8ab4f8; text-shadow: 0 0 15px rgba(138, 180, 248, 0.4); cursor: pointer; }

        .action-grid {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            justify-content: center;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background-color: var(--surface-color);
            border: 1px solid var(--chip-border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            transition: transform 0.1s; 
            cursor: pointer;
            font-family: 'Roboto', 'Microsoft YaHei', sans-serif;
            line-height: 1; 
        }

        .chip .material-symbols-outlined {
            font-size: 18px; 
            margin-right: 8px; 
            color: #0b57d0; 
            display: block;
        }
        
        @media (prefers-color-scheme: dark) {
            .chip .material-symbols-outlined { color: #8ab4f8; }
        }

        .chip span:not(.material-symbols-outlined) {
            position: relative;
            top: 1px;
        }

        @media (hover: hover) and (pointer: fine) {
            .chip:hover { background-color: var(--hover-color); border-color: var(--text-secondary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        }
        
        .chip:active { background-color: var(--active-color); transform: scale(0.96); }

        .bottom-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; width: 100%; height: 64px;
            background: var(--surface-color); 
            justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom); box-sizing: content-box;
        }

        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text-secondary); font-size: 12px; font-weight: 500;
            width: 64px; height: 100%; gap: 4px;
        }

        .bottom-nav-item.active .icon-container { background-color: var(--accent-blue); color: var(--accent-blue-text); }
        .bottom-nav-item .icon-container {
            width: 64px; height: 32px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; transition: background-color 0.2s;
        }
        
        .bottom-nav-item:active .icon-container { transform: scale(0.95); background-color: var(--active-color); }
        .bottom-nav-item .material-symbols-outlined { font-size: 24px; }

        @media (max-width: 768px) { 
            .topbar { display: none; } 
            .main-content { padding: 20px; padding-top: 12vh; padding-bottom: 80px; } 
            .action-grid { flex-wrap: wrap; }
            .bottom-nav { display: flex; }
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: var(--bg-color);
        }

        .topbar       { z-index: 20; }
        .main-content { position: relative; z-index: 10; }
        .bottom-nav   { z-index: 1000; }

        #rainCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998;
            pointer-events: none; opacity: 0; visibility: hidden; 
            transition: opacity 3s ease, visibility 3s;
            background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(4px);
        }
        #rainCanvas.active { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <nav class="topbar">
        <div class="logo-area">
            <span class="material-symbols-outlined" style="color: #0b57d0;">auto_awesome</span>
            <span>Trainingcqy</span>
        </div>
        <a href="#" class="nav-item active"><span class="material-symbols-outlined">home</span>首页</a>
        <a href="projects.html" class="nav-item"><span class="material-symbols-outlined">folder_open</span>项目</a>
        <a href="gallery.html" class="nav-item"><span class="material-symbols-outlined">photo_library</span>摄影</a>
    </nav>

    <main class="main-content">
        <div class="center-group">
        
        <div class="profile-section">
            <a href="javascript:void(0);" onclick="toggleRain()" style="text-decoration: none;">
                <img src="img/avatar.webp" onerror="this.src='https://ui-avatars.com/api/?name=TC&background=0b57d0&color=fff'" alt="Avatar" class="avatar">
            </a>

            <h1 class="user-name">
                <a href="visuals.html" class="secret-link">Trainingcqy</a>
            </h1>
        </div>

        <div class="action-grid">
            <a href="https://dashboard.trainingcqy.com/" target="_blank" class="chip">
                <span class="material-symbols-outlined">monitoring</span>科技前沿
            </a>
            <a href="projects.html" class="chip">
                <span class="material-symbols-outlined">view_quilt</span>项目
            </a>
            <a href="gallery.html" class="chip">
                <span class="material-symbols-outlined">photo_camera</span>摄影
            </a>
            <a id="contact-btn" onclick="copyEmail()" class="chip" style="cursor: pointer;">
                <span class="material-symbols-outlined">mail</span>
                <span id="email-label">联系</span>
            </a>
        </div>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="bottom-nav-item active">
            <div class="icon-container"><span class="material-symbols-outlined">home</span></div>
            <span>首页</span>
        </a>
        <a href="projects.html" class="bottom-nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">folder_open</span></div>
            <span>项目</span>
        </a>
        <a href="gallery.html" class="bottom-nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">photo_library</span></div>
            <span>摄影</span>
        </a>
    </nav>

    <canvas id="rainCanvas"></canvas>
    <audio id="bgm" loop preload="none"></audio>

    <script>
        function clearActiveStates() {
            document.body.style.visibility = 'hidden';
            document.body.offsetHeight;
            document.body.style.visibility = '';
        }

        window.addEventListener('pageshow', function (e) {
            const interactiveElements = document.querySelectorAll('a, button, .chip, .bottom-nav-item');
            interactiveElements.forEach(el => el.blur());
            
            if (e.persisted) {
                clearActiveStates();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                clearActiveStates();
            }
        });

        function copyEmail() {
            const btn = document.getElementById('contact-btn');
            const label = document.getElementById('email-label');
            const email = "trainingcqy@gmail.com";
            const originalText = "联系";
    
            navigator.clipboard.writeText(email).then(() => {
                label.innerText = "已复制";
                label.style.color = "#0b57d0";
                
                setTimeout(() => {
                    label.innerText = originalText;
                    label.style.color = ""; 
                    const newBtn = btn.cloneNode(true);
                    btn.parentNode.replaceChild(newBtn, btn);
                    document.getElementById('contact-btn').onclick = copyEmail;
                }, 1050);
                
            }).catch(err => {
                console.error(err);
                window.location.href = "mailto:" + email;
            });
        }

        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgm');
        
        const TARGET_VOLUME = 0.6; 

        let rainAnimationId;
        let stopTimeoutId;
        let fadeInterval;
        let drops =[];

        class Drop {
            constructor() { this.reset(true); }
            reset(initial = false) {
                this.x = Math.random() * canvas.width;
                this.y = initial ? Math.random() * canvas.height : Math.random() * -100;
                this.z = Math.random(); 
                this.speed = (this.z * 6) + 6; 
                this.len = (this.z * 7) + 7;
                this.width = (this.z * 0.75) + 0.7; 
                this.opacity = (this.z * 0.65) + 0.6;
                this.vx = (this.z * 0.5) + 0.5; 
            }
            fall() {
                this.x += this.vx;
                this.y += this.speed;
                if (this.y > canvas.height || this.x > canvas.width) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.vx, this.y + this.len);
                ctx.strokeStyle = `rgba(174, 194, 224, ${this.opacity})`;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round'; 
                ctx.stroke();
            }
        }

        function initDrops() {
            drops =[];
            const dropCount = Math.floor(window.innerWidth / 1.5);
            for (let i = 0; i < dropCount; i++) drops.push(new Drop());
        }

        function animateRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drops.forEach(drop => { drop.fall(); drop.draw(); });
            rainAnimationId = requestAnimationFrame(animateRain);
        }

        function toggleRain() {
            if (canvas.classList.contains('active')) {
                stopRain();
            } else {
                startRain();
            }
        }

        function startRain() {
            if (window.particleSystem) window.particleSystem.hide();

            if (stopTimeoutId) clearTimeout(stopTimeoutId);
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            if (!rainAnimationId) {
                initDrops();
                animateRain();
            }
            canvas.classList.add('active');
                
            if (!audio.src) {
                audio.src = "music/Rain after Summer.mp3"; 
            }
    
            if (fadeInterval) clearInterval(fadeInterval);
            audio.volume = TARGET_VOLUME; 
            audio.play().catch(() => {});
        }
    
        function stopRain() {
            canvas.classList.remove('active');

            if (window.particleSystem) window.particleSystem.burst();

            if (fadeInterval) clearInterval(fadeInterval);
            
            fadeInterval = setInterval(() => {
                if (audio.volume > 0.01) {
                    audio.volume *= 0.9;
                } else {
                    clearInterval(fadeInterval);
                    audio.pause();
                    audio.currentTime = 0;
                    audio.volume = TARGET_VOLUME;
                }
            }, 50);

            stopTimeoutId = setTimeout(() => {
                cancelAnimationFrame(rainAnimationId);
                rainAnimationId = null;
            }, 3000);
        }

        window.addEventListener('resize', () => {
            if(canvas.classList.contains('active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initDrops();
            }
        });

        (function () {
            const pCanvas = document.getElementById('particleCanvas');
            const pCtx    = pCanvas.getContext('2d');

            let pW, pH, pCx, pCy;
            let pMouseX = 0, pMouseY = 0;
            let pRotX = 0, pRotY = 0;

            const P_COLORS =['#4285F4', '#EA4335', '#FBBC05', '#34A853'];

            const P_CFG = {
                count:      675,
                depth:      700,        
                safeRadius: 200,
                boundary:   1800,
                rotSpeed:   0.00075,
                mouseSens:  0.0005,
            };

            const WINDUP_MS = 350;
            const BURST_MS  = 1400;
            let introStart  = null;
            let pReqId      = null;

            function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

            function pResize() {
                pW = pCanvas.width  = window.innerWidth;
                pH = pCanvas.height = window.innerHeight;
                pCx = pW / 2; pCy = pH / 2;
            }
            window.addEventListener('resize', pResize);
            pResize();

            document.addEventListener('mousemove', e => {
                pMouseX = e.clientX - pCx;
                pMouseY = e.clientY - pCy;
            });

            class Particle {
                constructor() { this.spawnBurst(); }

                spawnBurst() {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi   = Math.acos(2 * v - 1);
                    const r = P_CFG.safeRadius + Math.pow(Math.random(), 0.6) * (P_CFG.boundary - P_CFG.safeRadius) * 0.55;
                    this.fx = r * Math.sin(phi) * Math.cos(theta);
                    this.fy = r * Math.sin(phi) * Math.sin(theta);
                    this.fz = r * Math.cos(phi);
                    this.x = 0; this.y = 0; this.z = 0;
                    this.delay = Math.random() * 0.15;
                    this.vx = (Math.random() - 0.5) * 0.35;
                    this.vy = (Math.random() - 0.5) * 0.35;
                    this.vz = (Math.random() - 0.5) * 0.35;
                    this._setAppearance();
                    this.alpha   = 0;
                    this.settled = false;
                }

                spawn() {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi   = Math.acos(2 * v - 1);
                    const r = P_CFG.safeRadius + Math.pow(Math.random(), 0.6) * (P_CFG.boundary - P_CFG.safeRadius) * 0.55;
                    this.x = r * Math.sin(phi) * Math.cos(theta);
                    this.y = r * Math.sin(phi) * Math.sin(theta);
                    this.z = r * Math.cos(phi);
                    this.vx = (Math.random() - 0.5) * 0.35;
                    this.vy = (Math.random() - 0.5) * 0.35;
                    this.vz = (Math.random() - 0.5) * 0.35;
                    this._setAppearance();
                    this.alpha   = Math.random();
                    this.settled = true;
                }

                _setAppearance() {
                    this.color     = P_COLORS[Math.floor(Math.random() * P_COLORS.length)];
                    this.baseLen   = 3 + Math.random() * 3;
                    this.baseThick = 2 + Math.random() * 1;
                    this.dashAngle = Math.random() * Math.PI;
                    this.phase     = Math.random() * Math.PI * 2;
                    this.phaseSpd  = 0.0015 + Math.random() * 0.0025;
                }

                update(now) {
                    this.phase += this.phaseSpd;

                    if (this.settled) {
                        this.x += this.vx; this.y += this.vy; this.z += this.vz;
                        if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.015);
                        const d = Math.sqrt(this.x**2 + this.y**2 + this.z**2);
                        if (d > P_CFG.boundary) this.spawn();
                        return;
                    }

                    const elapsed = now - introStart;
                    if (elapsed < WINDUP_MS) { this.alpha = 0; return; }
                    const t = Math.min(1, (elapsed - WINDUP_MS - this.delay * BURST_MS) / BURST_MS);
                    if (t <= 0) { this.alpha = 0; return; }
                    const e = easeOutQuart(t);
                    this.x = this.fx * e;
                    this.y = this.fy * e;
                    this.z = this.fz * e;
                    this.alpha = Math.min(1, t * 5);
                    if (t >= 1) this.settled = true;
                }

                draw(rX, rY) {
                    if (this.alpha < 0.01) return;

                    const cY = Math.cos(rY), sY = Math.sin(rY);
                    const x1 =  this.x * cY - this.z * sY;
                    const z1 =  this.z * cY + this.x * sY;
                    const cX = Math.cos(rX), sX = Math.sin(rX);
                    const y1 =  this.y * cX - z1 * sX;
                    const z2 =  z1 * cX + this.y * sX;

                    const scale = P_CFG.depth / (P_CFG.depth + z2);
                    if (scale < 0 || scale > 8) return;

                    const sx = pCx + x1 * scale;
                    const sy = pCy + y1 * scale;

                    const depthFade = Math.max(0, Math.min(1,
                        (P_CFG.boundary * 0.9 - Math.abs(z2)) / (P_CFG.boundary * 0.9)
                    ));
                    const depthBright = Math.min(1, scale * 0.85 + 0.15);
                    const breath      = 0.8 + Math.sin(this.phase) * 0.2;
                    const finalAlpha  = this.alpha * depthFade * depthBright * breath;
                    if (finalAlpha < 0.02) return;

                    const len   = this.baseLen   * breath * scale;
                    const thick = this.baseThick * scale;
                    if (len < 0.5) return;

                    pCtx.save();
                    pCtx.translate(sx, sy);
                    pCtx.rotate(this.dashAngle);
                    pCtx.globalAlpha = finalAlpha;
                    pCtx.fillStyle   = this.color;

                    const hw = len / 2, hh = Math.max(thick / 2, 0.6);
                    pCtx.beginPath();
                    if (hw > hh) {
                        pCtx.moveTo(-hw + hh, -hh);
                        pCtx.lineTo( hw - hh, -hh);
                        pCtx.arc( hw - hh, 0, hh, -Math.PI / 2,  Math.PI / 2);
                        pCtx.lineTo(-hw + hh, hh);
                        pCtx.arc(-hw + hh, 0, hh,  Math.PI / 2, -Math.PI / 2);
                    } else {
                        pCtx.arc(0, 0, hh, 0, Math.PI * 2);
                    }
                    pCtx.closePath();
                    pCtx.fill();
                    pCtx.restore();
                }
            }

            const particles = Array.from({ length: P_CFG.count }, () => new Particle());

            function pAnimate(now) {
                if (!introStart) introStart = now;
                
                pCtx.clearRect(0, 0, pW, pH);

                pRotY += P_CFG.rotSpeed;
                pRotX += (pMouseY * P_CFG.mouseSens - pRotX) * 0.05;
                const finalRY = pRotY + pMouseX * P_CFG.mouseSens * 2;

                for (const p of particles) { p.update(now); p.draw(pRotX, finalRY); }

                pReqId = requestAnimationFrame(pAnimate);
            }

            window.particleSystem = {
                hide: function() {
                    if (pReqId) {
                        cancelAnimationFrame(pReqId);
                        pReqId = null;
                    }
                    pCtx.clearRect(0, 0, pW, pH);
                },
                burst: function() {
                    if (!pReqId) {
                        introStart = null;
                        particles.forEach(p => p.spawnBurst());
                        pReqId = requestAnimationFrame(pAnimate);
                    }
                }
            };

            pReqId = requestAnimationFrame(pAnimate);
        })();
    </script>
</body>
</html>
